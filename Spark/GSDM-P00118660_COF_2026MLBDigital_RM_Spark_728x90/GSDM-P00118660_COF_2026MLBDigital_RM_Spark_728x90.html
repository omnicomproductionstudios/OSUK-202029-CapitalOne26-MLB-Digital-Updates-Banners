<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="./css/style.css">
    </head>
    <body>
      <div id="banner">
        <!-- content -->
        <ft-default clickaction="expand">
        <!-- <img src="images/GSDM-P00118660_COF_2026MLBDigital_RM_Spark_728x90_Backup.jpg" style="width:728px; height: 90px; position: absolute; left: 0px; top: 0px; z-index: 111; opacity: .5;" alt=""> -->

          <div class="defaultBorder defaultSize"></div>
          <div class='capOneLogo'>
            <img src="images/redSwoop.svg" id="redSwoop" alt="">
            <img src="images/capital.svg" id="capital" alt="Capital">
            <img src="images/one.svg" id="one" alt="One">
          </div>

          <div id="txt1Cont">                
            <img src="images/txt1a.svg" id="txt1a" alt="Earn unlimited 2% cash back with Spark Cash Plus">
          </div>
            
          <div class="ballCont">
            <img src="images/baseball.png" id="ball" alt="baseball" />
            <img src="images/shadow.png" id="shadow" alt="baseball shadow" />
          </div>

          <img src="images/rArrow.svg" id="rArrow" alt="White arrow pointing right">

          <img class="expandBtn" src="images/expand_close_btn.svg" alt="click to expand">
        </ft-default>
        
        <ft-expand customclose>
        <!-- <img src="images/GSDM-P00118660_COF_2026MLBDigital_RM_Spark_728x250_Expanded_F3.jpg" style="width:728px; height: 250px; position: absolute; left: 0px; top: 0px; z-index: 111; opacity: .5;" alt=""> -->

          <div class='expCapOneLogo'>
            <img src="images/redSwoop.svg" id="expRedSwoop" alt="">
            <img src="images/capital.svg" id="expCapital" alt="Capital One">
            <img src="images/one.svg" id="expOne" alt="">
          </div>

          <div id="mlbLockupCont">
            <img src="images/MLB-Logo-Lockup.svg" id="mlbLockup" alt="Official bank and credit card partner of MLB. tm/© 2025 MLB. Capital One, N.A., Member FDIC">
          </div>

          <div class="ballContExp">
            <img src="images/baseball.png" id="ballExp" alt="baseball" />
            <img src="images/shadow.png" id="shadowExp" alt="baseball shadow" />
          </div>

          <div id="frame2">
            <img src="images/txt2a.svg" id="txt2a" alt="Earn unlimited 2% cash">
            <img src="images/txt2b.svg" id="txt2b" alt="back with Spark Cash Plus.">
            <img src="images/txt2c.svg" id="txt2c" alt="It's a serious play for">
            <img src="images/txt2d.svg" id="txt2d" alt="your business!">
          </div>

          <img src="images/rArrow.svg" id="rArrowExp" alt="White arrow pointing right">

          <div class="clickthrough expandSize" clicktag="1"></div>
          <div class="videoCont">
            <ft-video id="video1" name="video1"></ft-video>
            <ft-video-controls class="vidControls" for="video1"></ft-video-controls>
            <img id="vidPoster" src="images/poster.jpg" alt="">
          </div>
          <ft-click id="close"clickaction="contract">
            <p><img class="closeBtn" src="images/expand_close_btn.svg" alt="click to expand"></p>
          </ft-click>
          <div class="defaultBorder expandSize"></div>
        </ft-expand>
        <div id="cover" class="defaultSize"></div>
        <!-- scripts -->
        <script src="https://cdn.flashtalking.com/frameworks/js/api/2/10/html5API.js"></script>
        <script src="https://cdn.flashtalking.com/frameworks/js/gsap/3.11.5/gsap.min.js"></script>
        <script src="https://cdn.flashtalking.com/frameworks/js/gsap/3.11.5/EasePack.min.js"></script>

        <script src="js/main.js"></script>
      </div>
    </body>
</html>
